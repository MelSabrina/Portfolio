<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cálculo de Índice de Masa Corporal (IMC)</title>
    <style>

        :root {
            --imc-primary-color: #1d4ed8;
            --imc-secondary-color: #f3f4f6;
            --imc-text-color: #333;
            --imc-background-color: #f0f2f5;
            --imc-button-text-color: #333333;
            --imc-error-color: #d9534f;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--imc-background-color);
            color: var(--imc-text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        
  max-width: 720px;
  margin: 0 auto;}

        .toolbar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--imc-button-text-color);
            border-radius: 12px 12px 0 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .toolbar-title-container {
            flex-grow: 1;
            text-align: center;
        }

        .toolbar-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--imc-button-text-color);
            font-size: 1rem;
            cursor: pointer;
            padding: 0;
            transition: color 0.3s ease;
            max-width: 70px;
        }

        .back-button:hover {
            color: #e0f2fe;
        }

        .main-container {
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
        
  max-width: 720px;
  margin: 0 auto;}

        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            box-sizing: border-box;
            margin: 0 auto;
        
  max-width: 720px;
  margin: 0 auto;}

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
            margin-bottom: 20px;
        }

        .input-label {
            color: gray;
            font-weight: bold;
        }

        .input-field {
            border: 1px solid #ccc;
            border-radius: 8px;
            padding: 12px;
            font-size: 1rem;
            color: var(--imc-text-color);
            width: 100%;
            box-sizing: border-box;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--imc-primary-color);
            box-shadow: 0 0 5px rgba(29, 78, 216, 0.5);
        }

        .result-group {
            display: flex;
            flex-direction: column;
            margin-top: 20px;
        }

        .result-label {
            font-size: 1rem;
            color: gray;
        }

        .result-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            margin-top: 5px;
        }

        .button {
            background-color: var(--imc-primary-color);
            color: var(--imc-button-text-color);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .button:hover {
            background-color: #1a3c9e;
            transform: translateY(-2px);
        }

        /* Modal for error messages */
        .modal {
            display: none;
            position: fixed;
            z-index: 1001;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background-color: white;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            min-width: 250px;
            animation: fadeIn 0.3s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .modal-button {
            background-color: var(--imc-primary-color);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
        }
    
</style>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toolbar">
        <button class="back-button" onclick="goBack()">
            &lt; Volver
        </button>
        <div class="toolbar-title-container">
            <span class="toolbar-title">Cálculo de Índice de Masa Corporal (IMC)</span>
        </div>
    </div>

    <div class="main-container">
        <div class="container">
            <div class="input-group">
                <label class="input-label" for="ePeso">Peso (Kg.)</label>
                <input type="text" id="ePeso" class="input-field" placeholder="en Kgs." inputmode="decimal">
            </div>

            <div class="input-group">
                <label class="input-label" for="eAltura">Altura (cm.)</label>
                <input type="text" id="eAltura" class="input-field" placeholder="en cms." inputmode="decimal">
            </div>

            <div class="result-group">
                <label class="result-label">IMC<br>Índice de masa<br>corporal</label>
                <label id="lIMC" class="result-value">0 Kg/m²</label>
            </div>

            <button id="btnSave" class="button">Calcular valor IMC</button>
        </div>
    </div>

    <!-- Error Modal -->
    <div id="errorModal" class="modal">
        <div class="modal-content">
            <p id="modalMessage">Debe completar todos los datos</p>
            <button class="modal-button" onclick="closeModal()">Aceptar</button>
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        const ePeso = document.getElementById('ePeso');
        const eAltura = document.getElementById('eAltura');
        const lIMC = document.getElementById('lIMC');
        const btnSave = document.getElementById('btnSave');
        const errorModal = document.getElementById('errorModal');
        const modalMessage = document.getElementById('modalMessage');

        function showModal(message) {
            errorModal.style.display = 'flex';
            modalMessage.textContent = message;
        }

        function closeModal() {
            errorModal.style.display = 'none';
        }

        function calculaIMC(altura, peso) {
            const result = peso / Math.pow(altura / 100, 2);
            return result.toFixed(2) + " Kg/m²";
        }

        btnSave.addEventListener('click', () => {
            const peso = parseFloat(ePeso.value);
            const altura = parseFloat(eAltura.value);

            if (isNaN(peso) || isNaN(altura) || peso <= 0 || altura <= 0) {
                showModal("Debe completar todos los datos con valores mayores a cero.");
            } else {
                lIMC.textContent = calculaIMC(altura, peso);
            }
        });
    </script>
</body>
</html>
