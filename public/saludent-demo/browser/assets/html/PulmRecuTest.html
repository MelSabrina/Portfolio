<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EPOC: Cuestionario CODE</title>
    <style>

        :root {
            --pulm-primary-color: #88b8e2;
            --pulm-button-text-color: #2a2828;
            --pulm-label-background-color: #f3f4f6;
            --pulm-backdrop-color: #d1d5db;
            --pulm-text-color: #333;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f0f2f5;
            color: var(--pulm-text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        
  max-width: 720px;
  margin: 0 auto;}

        .toolbar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            color: var(--pulm-button-text-color);
            border-radius: 12px 12px 0 0;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .toolbar-title-container {
            flex-grow: 1;
            text-align: center;
        }

        .toolbar-title {
            font-size: 1.2rem;
            font-weight: bold;
        }

        .back-button {
            background: none;
            border: none;
            color: var(--pulm-button-text-color);
            font-size: 1rem;
            cursor: pointer;
            padding: 0;
            transition: color 0.3s ease;
            max-width: 70px;
        }

        .back-button:hover {
            color: #e0f2fe;
        }

        .main-container {
            padding: 1rem;
            flex-grow: 1;
            overflow-y: auto;
        
  max-width: 720px;
  margin: 0 auto;}

        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 0.5rem;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            padding: 1.5rem;
            box-sizing: border-box;
            margin: 0 auto;
        
  max-width: 720px;
  margin: 0 auto;}

        .info-label {
            font-size: 0.9rem;
            margin-bottom: 1rem;
            line-height: 1.4;
            padding: 10px;
            background-color: var(--pulm-label-background-color);
            border-radius: 8px;
        }

        .question-group {
            background-color: var(--pulm-primary-color);
            color: var(--pulm-button-text-color);
            padding: 1rem;
            margin: 10px 0;
            border-radius: 8px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        .question-label {
            font-weight: bold;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .radio-option {
            display: flex;
            align-items: center;
            margin: 0.5rem 0;
            cursor: pointer;
            user-select: none;
            position: relative;
            padding-left: 25px;
            min-height: 20px;
            color: var(--pulm-button-text-color);
            opacity: 0.7;
        }

        .radio-option:hover {
            opacity: 1;
        }

        .radio-option input[type="radio"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }

        .radio-checkmark {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            left: 0;
            height: 20px;
            width: 20px;
            background-color: var(--pulm-button-text-color);
            border-radius: 50%;
        }

        .radio-option input:checked ~ .radio-checkmark {
            opacity: 1;
        }

        .radio-checkmark:after {
            content: "";
            position: absolute;
            display: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--pulm-primary-color);
        }

        .radio-option input:checked ~ .radio-checkmark:after {
            display: block;
        }

        .button {
            background-color: var(--pulm-primary-color);
            color: var(--pulm-button-text-color);
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            width: 100%;
            max-width: 300px;
            display: block;
            margin-left: auto;
            margin-right: auto;
            transition: background-color 0.3s ease, transform 0.1s ease;
        }

        .button:hover {
            background-color: #08406b;
            transform: translateY(-2px);
        }

        .result-frame {
            background-color: var(--pulm-label-background-color);
            border: 1px solid var(--pulm-backdrop-color);
            border-radius: 8px;
            padding: 20px;
            margin: 20px auto;
            max-width: 340px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
        }

        .result-label {
            font-weight: bold;
            font-size: 1.2rem;
            color: var(--pulm-text-color);
            margin-bottom: 5px;
        }
    
</style>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="toolbar">
        <button class="back-button" onclick="goBack()">
            &lt; Volver
        </button>
        <div class="toolbar-title-container">
            <span class="toolbar-title">EPOC: Cuestionario CODE</span>
        </div>
    </div>

    <div class="main-container">
        <div class="container">
            <p class="info-label">
                Marque las respuestas correctas.
            </p>

            <div class="question-group">
                <label class="question-label">1. ¿Su género es masculino?</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta1" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta1" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <div class="question-group">
                <label class="question-label">2. ¿Su edad es mayor o igual a 50 años?</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta2" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta2" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <div class="question-group">
                <label class="question-label">3. ¿Ha fumado 30 o más paquetes/años? (Cigarrillos por día X años de fumador / 20)</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta3" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta3" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <div class="question-group">
                <label class="question-label">4. ¿Siente falta de aire al subir pendientes leves o caminar apurado?:</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta4" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta4" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <div class="question-group">
                <label class="question-label">5. ¿Ha tenido tos, la mayoría de los días, por más de 2 años?:</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta5" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta5" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <div class="question-group">
                <label class="question-label">6. ¿Ha tenido flemas, la mayoría de los días, por más de 2 años?:</label>
                <label class="radio-option">
                    <input type="radio" name="pregunta6" value="0" checked>
                    <span class="radio-checkmark"></span>
                    <span>(0) No</span>
                </label>
                <label class="radio-option">
                    <input type="radio" name="pregunta6" value="1">
                    <span class="radio-checkmark"></span>
                    <span>(1) Sí</span>
                </label>
            </div>

            <button id="btnSave" class="button">Calcular Resultado</button>

            <div class="result-frame">
                <p id="lblResult" class="result-label">Puntaje: 0</p>
                <p id="lblResult2" class="result-label">Sin recomendación</p>
            </div>
            
        </div>
    </div>

    <script>
        function goBack() {
            window.history.back();
        }

        document.addEventListener('DOMContentLoaded', () => {
            const btnSave = document.getElementById('btnSave');
            const lblResult = document.getElementById('lblResult');
            const lblResult2 = document.getElementById('lblResult2');

            let preg01 = 0;
            let preg02 = 0;
            let preg03 = 0;
            let preg04 = 0;
            let preg05 = 0;
            let preg06 = 0;

            const updateScore = (name, value) => {
                switch (name) {
                    case 'pregunta1': preg01 = value; break;
                    case 'pregunta2': preg02 = value; break;
                    case 'pregunta3': preg03 = value; break;
                    case 'pregunta4': preg04 = value; break;
                    case 'pregunta5': preg05 = value; break;
                    case 'pregunta6': preg06 = value; break;
                }
            };

            // Set initial state based on default checked radios
            document.querySelectorAll('input[type="radio"]:checked').forEach(radio => {
                updateScore(radio.name, parseInt(radio.value, 10));
            });

            // Add listeners to all radio buttons
            document.querySelectorAll('input[type="radio"]').forEach(radio => {
                radio.addEventListener('change', (event) => {
                    updateScore(event.target.name, parseInt(event.target.value, 10));
                });
            });

            btnSave.addEventListener('click', () => {
                const resultado = preg01 + preg02 + preg03 + preg04 + preg05 + preg06;

                let riesgo = "Sin recomendación";
                if (resultado >= 4) {
                    riesgo = "Se recomienda realizar una espirometría";
                }

                lblResult.textContent = `Puntaje: ${resultado}`;
                lblResult2.textContent = riesgo;
            });
        });
    </script>
</body>
</html>
