<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación: Cuadros y algoritmos</title>
    <style>

        /* --- 1. Variables y Estilos Base --- */
        :root {
            --alim-primary-color: #4CAF50; /* Verde Saludable */
            --page-background: white;
            --text-color: #333;
            --font-family: 'Inter', sans-serif;
            --shadow-color: rgba(0, 0, 0, 0.15);
        }

        body {
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--page-background);
            line-height: 1.6;
            color: var(--text-color);
        
  max-width: 720px;
  margin: 0 auto;}

        /* --- 2. Toolbar (Barra de navegación) - SIN COLOR --- */
        .toolbar {
            background-color: white; 
            border-bottom: 1px solid #ddd;
            display: flex;
            align-items: center;
            padding: 10px 15px;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 1px 3px var(--shadow-color);
        }
        .back-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-color);
            transition: color 0.2s;
        }
        .back-button:hover {
            color: var(--alim-primary-color);
        }
        .toolbar-title {
            flex-grow: 1;
            text-align: center;
            font-size: 1.15rem;
            font-weight: 600;
            color: var(--text-color);
        }
        .toolbar-placeholder {
            width: 34px; 
        }

        /* --- 3. Contenido Principal y Estilos de Texto --- */
        .scroll-container {
            padding: 10px; 
            max-width: 800px;
            margin: 0 auto;
        }

        /* Simulación de Style="{StaticResource AlimLabel}" */
        .alim-label {
            font-size: 1rem;
            margin: 10px 10px 20px 10px;
            text-align: justify;
        }

        /* Contenedor de Imagen y Margen especial */
        .image-container {
            width: 100%;
            padding: 10px;
            margin-bottom: 100px; /* Simula Margin="10,10,10,100" */
            box-sizing: border-box;
        }
        
        .resource-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 8px; /* Opcional: para mejor estética */
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
        }

        /* --- 4. Botón de Navegación Fijo (NavButton) --- */
        .nav-button-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 950;
        }
        .nav-button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background-color: var(--alim-primary-color);
            border: none;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.4);
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }
        .nav-button:hover {
            background-color: #388E3C; 
            transform: scale(1.05);
        }
    
</style>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;700&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 1. Toolbar -->
    <div class="toolbar">
        <button class="back-button" onclick="window.history.back()">
            <!-- Icono de flecha de retroceso (SVG) -->
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </button>
        <div class="toolbar-title">
            Evaluación: Cuadros y algoritmos
        </div>
        <div class="toolbar-placeholder"></div>
    </div>

    <!-- 2. Contenido Principal -->
    <div class="scroll-container" id="contenido">
        
        <div class="stack-content">

            <!-- Párrafo de texto -->
            <p class="alim-label">
                Utilizando como patrón de referencia las Guías Alimentarias para la Población Argentina, se puede evaluar si una alimentación es saludable utilizando la siguiente tabla:
            </p>

            <!-- Imagen (Simulación de ZoomImage sin zoom) -->
            <div class="image-container">
                <img class="resource-image" 
                     src="/assets/img/al_eval_tab1.png" 
                     alt="Tabla Alimentación Saludable - Evaluación"
                     title="Tabla Alimentación Saludable"
                >
            </div>
                
            </StackLayout>

    </div>
    
</body>
</html>
